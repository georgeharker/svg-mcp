9.0" x2="500.0" y2="879.0" id="line9828" style="stroke:#ffffff;stroke-opacity:0.28;stroke-width:1.0"/><line x1="592.0" y1="879.0" x2="1006.0" y2="879.0" id="line5939" style="stroke:#ffffff;stroke-opacity:0.28;stroke-width:1.0"/><line x1="1098.0" y1="879.0" x2="1512.0" y2="879.0" id="line5140" style="stroke:#ffffff;stroke-opacity:0.28;stroke-width:1.0"/><text x="86.0" y="209.0" id="text5876" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">server.py</text><text x="592.0" y="209.0" id="text2708" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">schemas/</text><text x="1098.0" y="209.0" id="text1557" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">session.py</text><text x="86.0" y="524.0" id="text7325" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">ops/</text><text x="592.0" y="524.0" id="text619" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">query/</text><text x="1098.0" y="524.0" id="text9613" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">model/</text><text x="86.0" y="839.0" id="text3553" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">typeset.py</text><text x="592.0" y="839.0" id="text4343" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">render/</text><text x="1098.0" y="839.0" id="text6912" style="fill:#ffffff;font-family:Meslo LG S DZ;font-size:26px;font-weight:700">serialize/</text><text x="87.0" y="235.0" id="text5109" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">FastMCP application</text><text x="593.0" y="235.0" id="text4710" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">Validated wire contract (pydantic)</text><text x="1099.0" y="235.0" id="text279" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">Per-session document store</text><text x="87.0" y="550.0" id="text4363" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">inkex-facing construction &amp; edit</text><text x="593.0" y="550.0" id="text7640" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">Read-only introspection</text><text x="1099.0" y="550.0" id="text8248" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">Document model &amp; handles</text><text x="593.0" y="865.0" id="text3951" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">Serialize-then-rasterize</text><text x="104.0" y="279.0" id="text616" inkscape:label="bul0" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  ~100 MCP tools + readable resources<tspan x="104.0" dy="28.0" id="tspan2985">&#8226;  System instructions: the LLM's guide</tspan><tspan x="104.0" dy="28.0" id="tspan1576">&#8226;  @emits_change render-feedback wrapper</tspan><tspan x="104.0" dy="28.0" id="tspan5355">&#8226;  Per-session document stores</tspan></text><text x="1116.0" y="279.0" id="text7257" inkscape:label="bul2" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  DocumentStore: create / peek / active<tspan x="1116.0" dy="28.0" id="tspan4052">&#8226;  Keyed by the MCP ServerSession</tspan><tspan x="1116.0" dy="28.0" id="tspan4960">&#8226;  Tracks the active document</tspan><tspan x="1116.0" dy="28.0" id="tspan3519">&#8226;  Resolves ids and friendly names</tspan></text><text x="104.0" y="594.0" id="text1347" inkscape:label="bul3" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  construct &#183; modify &#183; paths<tspan x="104.0" dy="28.0" id="tspan1813">&#8226;  layers &#183; pages &#183; resources &#183; meta</tspan><tspan x="104.0" dy="28.0" id="tspan7649">&#8226;  shapes, text, groups, transforms</tspan><tspan x="104.0" dy="28.0" id="tspan5320">&#8226;  gradients, filters, clips, masks</tspan></text><text x="610.0" y="594.0" id="text5562" inkscape:label="bul4" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  outline: the document tree<tspan x="610.0" dy="28.0" id="tspan1560">&#8226;  inspect: bbox, computed style, xform</tspan><tspan x="610.0" dy="28.0" id="tspan8996">&#8226;  select: find / get_subtree</tspan><tspan x="610.0" dy="28.0" id="tspan6352">&#8226;  Orient before you edit</tspan></text><text x="1116.0" y="594.0" id="text2405" inkscape:label="bul5" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  document: the SVG DOM (inkex)<tspan x="1116.0" dy="28.0" id="tspan4751">&#8226;  handles: stable node references</tspan><tspan x="1116.0" dy="28.0" id="tspan4157">&#8226;  errors: typed, legible failures</tspan></text><text x="104.0" y="909.0" id="text4988" inkscape:label="bul6" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  Scans system fonts (list_fonts)<tspan x="104.0" dy="28.0" id="tspan6908">&#8226;  Glyph outlines: anchors, weight, italic</tspan><tspan x="104.0" dy="28.0" id="tspan2516">&#8226;  Text-on-path arc-length glyph walk</tspan><tspan x="104.0" dy="28.0" id="tspan6577">&#8226;  measure_text: size text, no render</tspan></text><text x="1116.0" y="909.0" id="text5670" inkscape:label="bul8" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  export_svg: canonical document text<tspan x="1116.0" dy="28.0" id="tspan8098">&#8226;  The artifact + the render input</tspan><tspan x="1116.0" dy="28.0" id="tspan1888">&#8226;  Clean, portable output</tspan></text><text x="87.0" y="865.0" id="text1976" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">Pure-Python text -&gt; path (fontTools)</text><text x="1099.0" y="865.0" id="text5729" style="fill:#ffffff;fill-opacity:0.82;font-family:Avenir Next;font-size:16px">Model -&gt; SVG source</text><text x="610.0" y="279.0" id="text1011" inkscape:label="bul1" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  ShapeStyle -&gt; SVG presentation props<tspan x="610.0" dy="28.0" id="tspan3792">&#8226;  Gradient stops, filter primitives</tspan><tspan x="610.0" dy="28.0" id="tspan8385">&#8226;  Color / paint validation at the edge</tspan><tspan x="610.0" dy="28.0" id="tspan8635">&#8226;  Flattens to plain style dicts</tspan></text><text x="610.0" y="909.0" id="text9712" inkscape:label="bul7" style="fill:#ffffff;fill-opacity:0.95;font-family:Avenir Next;font-size:16.5px">&#8226;  resvg: faithful PNG preview<tspan x="610.0" dy="28.0" id="tspan6656">&#8226;  export: jpeg/webp + pdf/ps/eps (librsvg)</tspan><tspan x="610.0" dy="28.0" id="tspan7951">&#8226;  feedback: downscale -&gt; base64 image</tspan><tspan x="610.0" dy="28.0" id="tspan310">&#8226;  cairo/inkscape: stubs (unfaithful)</tspan></text></svg>