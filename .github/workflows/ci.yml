name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install (with dev extras)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Types (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        # resvg renders in-process via resvg-py; the CLI smoke test auto-skips if absent.
        run: uv run pytest -q
